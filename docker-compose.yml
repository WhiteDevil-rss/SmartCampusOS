version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: vnsgu_admin
      POSTGRES_PASSWORD: supersecretpassword
      POSTGRES_DB: nep_scheduler
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U vnsgu_admin -d nep_scheduler" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  ai-engine:
    build:
      context: ./apps/ai-engine
      dockerfile: Dockerfile
    restart: always
    environment:
      - PORT=5000

  api:
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
    restart: always
    ports:
      - "8000:8000"
    environment:
      - NODE_ENV=production
      - PORT=8000
      - DATABASE_URL=postgresql://vnsgu_admin:supersecretpassword@postgres:5432/nep_scheduler
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=production_secret_key_vnsgu_1234
      - AI_ENGINE_URL=http://ai-engine:5000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-engine:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
